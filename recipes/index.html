<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Book</title>
  <meta
    name="description"
    content="Recipe Book features delicious recipes with ratings, tags, and a clean responsive layout."
  >

  <meta property="og:type" content="website">
  <meta property="og:title" content="Recipe Book">
  <meta
    property="og:description"
    content="Search and discover delicious recipes in a clean responsive layout."
  >
  <meta property="og:url" content="https://austinsego12.github.io/WDD131/recipes/">
  <meta property="og:image" content="https://austinsego12.github.io/WDD131/recipes/images/social-preview.jpg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Recipe Book">
  <meta
    name="twitter:description"
    content="Search and discover delicious recipes in a clean responsive layout."
  >
  <meta name="twitter:image" content="https://austinsego12.github.io/WDD131/recipes/images/social-preview.jpg">

  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="recipes.css">
  <script src="recipes.js" type="module" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="images/recipe-book.png" alt="Recipe Book logo" class="logo">
      <h1>Recipe Book</h1>
    </div>

    <form class="search-form" id="searchForm">
      <label for="searchInput" class="visually-hidden">Search recipes</label>
      <input type="search" id="searchInput" name="search" placeholder="Find a recipe">
      <button type="submit" aria-label="Search">
        <img src="images/search.svg" alt="">
      </button>
    </form>
  </header>

  <main>
    <section id="recipeContainer"></section>
  </main>

  <footer class="site-footer">
    <div class="social">
      <a href="#" aria-label="Visit our Instagram page">
        <img src="images/instagram_icon.svg" alt="Instagram icon">
      </a>
      <a href="#" aria-label="Visit our YouTube channel">
        <img src="images/youtube_icon.svg" alt="YouTube icon">
      </a>
      <a href="#" aria-label="Visit our Pinterest page">
        <img src="images/pinterest_icon.svg" alt="Pinterest icon">
      </a>
    </div>

    <p>
      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
        Recipe icons created by Freepik - Flaticon
      </a>
    </p>
  </footer>
</body>
</html>
